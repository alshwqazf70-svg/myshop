services:
  - type: web
    name: geolegend
    runtime: python
    pythonVersion: 3.11.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:application --worker-class eventlet -w 1 -b 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
